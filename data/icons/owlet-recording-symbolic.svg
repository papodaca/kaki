<?xml version="1.0" encoding="UTF-8"?>
<!-- Owlet - symbolic/tray icon, recording state. Same owl silhouette
     as owlet-symbolic.svg plus a recording-light dot badge in the
     bottom-right corner. The gap ring around the dot is cut with a
     mask so the badge stays readable on any panel color. The dot
     carries class="error" so GTK-style symbolic recoloring can tint
     it red; it stays monochrome everywhere else. -->
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <defs>
    <mask id="badge-gap">
      <rect width="16" height="16" fill="#fff"/>
      <circle cx="13.5" cy="13.5" r="3" fill="#000"/>
    </mask>
  </defs>
  <path fill="#2e3436" fill-rule="evenodd" mask="url(#badge-gap)" d="
    M 3.0 1.4
    L 4.1 4.6
    A 5.6 5.9 0 1 0 11.9 4.6
    L 13.0 1.4
    L 9.4 3.1
    A 5.6 5.9 0 0 0 6.6 3.1
    Z
    M 4.0 6.8 A 1.8 1.8 0 1 0 7.6 6.8 A 1.8 1.8 0 1 0 4.0 6.8 Z
    M 8.4 6.8 A 1.8 1.8 0 1 0 12.0 6.8 A 1.8 1.8 0 1 0 8.4 6.8 Z
    M 7.1 9.1 L 8.9 9.1 L 8 10.5 Z
    M 5.5 11.5 H 6.5 V 13.5 H 5.5 Z
    M 7.5 11 H 8.5 V 14 H 7.5 Z
    M 9.5 11.5 H 10.5 V 13.5 H 9.5 Z
  "/>
  <circle class="error" cx="13.5" cy="13.5" r="2.1" fill="#2e3436"/>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<!-- Owlet - audio transcription app icon.
     A night-time owlet whose belly carries a voice waveform.
     128x128 grid, flat GNOME-ish style. -->
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a3d94"/>
      <stop offset="1" stop-color="#221b47"/>
    </linearGradient>
    <linearGradient id="plumage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bd8952"/>
      <stop offset="1" stop-color="#8f5c2f"/>
    </linearGradient>
  </defs>

  <!-- night-sky plate -->
  <rect x="6" y="6" width="116" height="116" rx="28" fill="url(#night)"/>

  <!-- stars -->
  <circle cx="24" cy="27" r="1.7" fill="#ffffff" opacity="0.55"/>
  <circle cx="104" cy="22" r="1.3" fill="#ffffff" opacity="0.4"/>
  <circle cx="97" cy="39" r="1.1" fill="#ffffff" opacity="0.3"/>
  <circle cx="33" cy="45" r="1.1" fill="#ffffff" opacity="0.3"/>
  <circle cx="88" cy="14" r="1.0" fill="#ffffff" opacity="0.25"/>

  <!-- feet, peeking out below the body -->
  <ellipse cx="52" cy="110" rx="6" ry="7" fill="#f5a33b"/>
  <ellipse cx="76" cy="110" rx="6" ry="7" fill="#f5a33b"/>

  <!-- ear tufts -->
  <polygon points="42,50 45,23 60,37" fill="#bd8952"/>
  <polygon points="86,50 83,23 68,37" fill="#bd8952"/>

  <!-- body -->
  <ellipse cx="64" cy="72" rx="34" ry="38" fill="url(#plumage)"/>

  <!-- wings -->
  <ellipse cx="36" cy="84" rx="9" ry="19" fill="#7c4b28" transform="rotate(14 36 84)"/>
  <ellipse cx="92" cy="84" rx="9" ry="19" fill="#7c4b28" transform="rotate(-14 92 84)"/>

  <!-- belly with voice waveform -->
  <ellipse cx="64" cy="91" rx="22" ry="17" fill="#f6e8c9"/>
  <g fill="#6a55c8">
    <rect x="47" y="86" width="4" height="10" rx="2"/>
    <rect x="53" y="81" width="4" height="20" rx="2"/>
    <rect x="59" y="84" width="4" height="14" rx="2"/>
    <rect x="65" y="80" width="4" height="22" rx="2"/>
    <rect x="71" y="82" width="4" height="18" rx="2"/>
    <rect x="77" y="86" width="4" height="10" rx="2"/>
  </g>

  <!-- facial discs -->
  <circle cx="48" cy="60" r="15.5" fill="#7c4b28"/>
  <circle cx="80" cy="60" r="15.5" fill="#7c4b28"/>

  <!-- eyes -->
  <circle cx="48" cy="60" r="12" fill="#fbf3df"/>
  <circle cx="80" cy="60" r="12" fill="#fbf3df"/>
  <circle cx="48" cy="60" r="5.5" fill="#2c2352"/>
  <circle cx="80" cy="60" r="5.5" fill="#2c2352"/>
  <circle cx="50" cy="58" r="2" fill="#ffffff"/>
  <circle cx="82" cy="58" r="2" fill="#ffffff"/>

  <!-- beak -->
  <path d="M 57 69.5 Q 64 67 71 69.5 L 64 78.5 Z" fill="#f5a33b"/>
</svg>
